<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- External CSS and Scripts -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Section -->
    <section id="loginPage" class="flex justify-center items-center min-h-screen bg-slate-50">
        <div class="card bg-white w-96 shadow-2xl p-10 text-center border border-gray-100">
            <div class="mb-6">
                <i class="fa-brands fa-github text-6xl"></i>
                <h2 class="text-2xl font-extrabold mt-4">GitHub Issues Tracker</h2>
                <p class="text-gray-400 text-sm">Sign in to manage your issues</p>
            </div>
            
            <!-- Enter Button -->
            <form onsubmit="handleLogin(event)" class="space-y-4 text-left">
                <div class="form-control">
                    <label class="label font-bold text-xs uppercase text-gray-500">Username</label>
                    <input id="usernameInput" type="text" placeholder="Enter username" class="input input-bordered focus:input-primary" required />
                </div>
                <div class="form-control">
                    <label class="label font-bold text-xs uppercase text-gray-500">Password</label>
                    <input id="passwordInput" type="password" placeholder="Enter password" class="input input-bordered focus:input-primary" required />
                </div>
                <!-- 'submit'-->
                <button type="submit" class="btn btn-primary w-full mt-4 text-white font-bold">Sign In</button>
            </form>

            <!-- Password Demo -->
            <div class="mt-8 p-4 bg-slate-100 rounded-xl text-xs text-left border border-dashed border-gray-300">
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </section>

    <!-- Dashboard Section (Hidden by default) -->
    <section id="dashboard" class="hidden min-h-screen bg-[#F8FAFC]">
        <nav class="navbar bg-white border-b px-4 lg:px-20 sticky top-0 z-50 shadow-sm">
            <div class="flex-1">
                <a class="flex items-center gap-3 cursor-pointer">
                    <i class="fa-brands fa-github text-3xl"></i>
                    <span class="font-bold text-xl tracking-tight">GitHub Issues Tracker</span>
                </a>
            </div>
            <div class="flex-none">
                <div class="join">
                    <input id="searchInput" type="text" placeholder="Search issues..." 
                        class="input input-bordered join-item w-40 md:w-72 h-10 bg-gray-50 focus:outline-none" />
                    <button onclick="handleSearch()" class="btn btn-primary join-item h-10 px-6 text-white font-bold">
                        Search
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-12">
            <div class="flex justify-center mb-10">
                <div class="bg-white p-1 rounded-2xl shadow-sm border inline-flex gap-1">
                    <button id="btn-all" onclick="loadIssues('all', this)" class="btn btn-primary border-none rounded-xl px-8">All</button>
                    <button id="btn-open" onclick="loadIssues('open', this)" class="btn btn-ghost rounded-xl px-8">Open</button>
                    <button id="btn-closed" onclick="loadIssues('closed', this)" class="btn btn-ghost rounded-xl px-8">Closed</button>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b flex flex-wrap justify-between items-center gap-4 bg-gray-50/50">
                    <div class="flex items-center gap-4">
                        <div class="bg-primary/10 p-3 rounded-2xl">
                            <i class="fa-solid fa-circle-nodes text-primary text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-xl"><span id="issueCount">0</span> Issues</h3>
                            <p class="text-xs text-gray-400">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <span class="flex items-center gap-2 text-xs font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-100">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Open
                        </span>
                        <span class="flex items-center gap-2 text-xs font-bold text-purple-600 bg-purple-50 px-3 py-1 rounded-full border border-purple-100">
                            <span class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed
                        </span>
                    </div>
                </div>

                <div id="loader" class="flex justify-center py-32 hidden">
                    <span class="loading loading-infinity loading-xl text-primary"></span>
                </div>

                <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8">
                    <!-- Dynamic Issues will load here -->
                </div>
            </div>
        </main>
    </section>

    <!-- Modal for Issue Details -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl rounded-3xl p-0 overflow-hidden">
            <div id="modalHeaderColor" class="h-2 w-full"></div>
            <div class="p-8">
                <div class="flex justify-between items-start mb-6">
                    <h3 id="modalTitle" class="font-extrabold text-3xl text-gray-800 leading-tight"></h3>
                    <form method="dialog">
                        <button class="btn btn-sm btn-circle btn-ghost">✕</button>
                    </form>
                </div>
                <div id="modalBody"></div>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
